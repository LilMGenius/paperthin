name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Validate the skill catalog
        run: bash scripts/validate-skills.sh
      - name: Catalog SSOT drift-guard
        run: node scripts/check-catalog-sync.cjs
